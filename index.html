<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Food Choice Jenga</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        /* UI Overlays */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        #header {
            padding: 20px;
            color: white;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            animation: fadeIn 2s;
        }

        /* The Info Card Modal */
        #info-card {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 30px;
            color: white;
            width: 320px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.05);
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: auto;
        }

        #info-card.active {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        #emoji-badge {
            font-size: 3rem;
            margin-bottom: 10px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        #food-item {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        #color-meaning {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 8px 12px;
            border-radius: 20px;
            display: inline-block;
            font-weight: bold;
        }

        /* Controls */
        #controls {
            padding: 20px;
            display: flex;
            justify-content: flex-end;
            align-items: flex-end;
        }

        #reset-btn {
            pointer-events: auto;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #reset-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }

        #reset-btn:active {
            transform: translateY(0);
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(-10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        .instruction {
            color: #aaa;
            font-size: 0.9rem;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div id="header">
            <h2>Dietary Jenga</h2>
            <div class="instruction">Drag to rotate • Scroll to zoom • Click a block to inspect</div>
        </div>

        <div id="info-card">
            <div id="emoji-badge">🍔</div>
            <div id="food-item">Food Name</div>
            <div id="color-meaning" style="background-color: #333;">MEANING</div>
        </div>

        <div id="controls">
            <button id="reset-btn">
                <span>🔄</span> Reset Tower
            </button>
        </div>
    </div>

    <!-- Load Three.js and OrbitControls -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // --- 1. CONFIGURATION & DATA MAP ---
        
        // Colors & Metadata definitions
        const BLOCK_CONFIG = {
            'pink': { 
                hex: 0xFF69B4, 
                meaning: "NO TIME TO EAT CORRECTLY", 
                emoji: "🍜 Chaos Mode" 
            },
            'green': { 
                hex: 0x4CAF50, 
                meaning: "Dinner in bed", 
                emoji: "🛌 Cozy Mode" 
            },
            'blue': { 
                hex: 0x2196F3, 
                meaning: "A PROPER MEAL", 
                emoji: "👑 Proper Feast" 
            }
        };

        // Block dimensions
        const W = 1.0;
        const H = 0.4;
        const D = 0.6;
        
        // Layers mapped exactly to the specifications
        const towerData = [
            // Layer 1 (Bottom)
            { y: H/2, blocks: [
                { x: -1.05, z: 0, color: 'blue', text: 'Maggie and Thumbs up' },
                { x: 0, z: 0, color: 'pink', text: 'Paneer Bhurji, 2 egg yellows and Thumbs up' },
                { x: 1.05, z: 0, color: 'pink', text: 'Shawarma and cold coffee' }
            ]},
            // Layer 2
            { y: H/2 + H*1, blocks: [
                { x: -1.05, z: 0, color: 'green', text: 'Dal Makhni and Blueberry Cheesecake icecream' },
                { x: 0, z: 0, color: 'pink', text: 'Shawarma and Thumbs up' },
                { x: 1.05, z: 0, color: 'blue', text: 'Soya Chaap and Thumbs up' }
            ]},
            // Layer 3
            { y: H/2 + H*2, blocks: [
                { x: 0, z: 0, color: 'pink', text: 'Paneer Tikka Sub Sandwich and Thumbs up' }
            ]},
            // Layer 4
            { y: H/2 + H*3, blocks: [
                { x: -1.05, z: 0, color: 'pink', text: 'Mexican loaded Nachos and Thumbs up' },
                { x: 0, z: 0, color: 'blue', text: 'Chicken Sandwich and 2 boiled eggs' },
                { x: 1.05, z: 0, color: 'green', text: 'Dahi Chawal' }
            ]},
            // Layer 5
            { y: H/2 + H*4, blocks: [
                { x: -1.05, z: 0, color: 'green', text: 'Dahi Chawal and Sprite' },
                { x: 0, z: 0, color: 'pink', text: 'No dinner' },
                { x: 1.05, z: 0, color: 'green', text: 'Dahi Chawal' }
            ]},
            // Layer 6
            { y: H/2 + H*5, blocks: [
                { x: 0, z: 0, color: 'green', text: 'Spicy Panner Pizza and Gatorade' }
            ]},
            // Layer 7
            { y: H/2 + H*6, blocks: [
                { x: -1.05, z: 0, color: 'blue', text: 'Dahi Chawal and Thumbs up' },
                { x: 0, z: 0, color: 'pink', text: 'Blueberry Cheesecake icecream (family tub)' },
                { x: 1.05, z: 0, color: 'blue', text: 'Pizza and Thumbs up' }
            ]},
            // Layer 8
            { y: H/2 + H*7, blocks: [
                { x: -1.05, z: 0, color: 'blue', text: 'Dahi Chawal and Nachos' },
                { x: 0, z: 0, color: 'green', text: 'Maggie' },
                { x: 1.05, z: 0, color: 'pink', text: 'No dinner' }
            ]},
            // Layer 9 (Top)
            { y: H/2 + H*8, blocks: [
                { x: 0, z: 0, color: 'pink', text: 'Maggie' }
            ]}
        ];

        // --- 2. THREE.JS SCENE SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x111111, 0.03);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        // Position camera to look at the tower from a nice angle
        camera.position.set(5, 4, 6);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        // Target the center of the tower (9 layers * 0.4 height = 3.6. Center is 1.8)
        controls.target.set(0, 1.8, 0); 
        controls.maxDistance = 15;
        controls.minDistance = 3;

        // --- 3. LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 25;
        dirLight.shadow.camera.left = -5;
        dirLight.shadow.camera.right = 5;
        dirLight.shadow.camera.top = 5;
        dirLight.shadow.camera.bottom = -5;
        scene.add(dirLight);

        const pointLight = new THREE.PointLight(0xffffff, 0.5, 20);
        pointLight.position.set(-5, 3, -5);
        scene.add(pointLight);

        // --- 4. ENVIRONMENT ---
        // Subtle floor shadow receiver
        const floorGeo = new THREE.PlaneGeometry(50, 50);
        const floorMat = new THREE.MeshStandardMaterial({ 
            color: 0x111111, 
            roughness: 0.8,
            metalness: 0.2
        });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // Neon Wireframe Box surrounding the tower
        // Bounds calc: X (-1.05 to 1.05) -> width ~3.1, Z (0) -> depth ~0.6, Y (0 to 3.6)
        const frameGeo = new THREE.BoxGeometry(3.4, 4.0, 1.2);
        const edges = new THREE.EdgesGeometry(frameGeo);
        const frameMat = new THREE.LineBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.3 });
        const frame = new THREE.LineSegments(edges, frameMat);
        frame.position.set(0, 1.8, 0); // Center of the 3.6h tower
        scene.add(frame);

        // --- 5. BUILD THE TOWER ---
        const blocks = [];
        const blockGeo = new THREE.BoxGeometry(W, H, D);
        
        // Cache materials to improve performance
        const materials = {
            'pink': new THREE.MeshStandardMaterial({ color: BLOCK_CONFIG['pink'].hex, roughness: 0.2, metalness: 0.1 }),
            'green': new THREE.MeshStandardMaterial({ color: BLOCK_CONFIG['green'].hex, roughness: 0.2, metalness: 0.1 }),
            'blue': new THREE.MeshStandardMaterial({ color: BLOCK_CONFIG['blue'].hex, roughness: 0.2, metalness: 0.1 })
        };

        towerData.forEach(layer => {
            layer.blocks.forEach(bData => {
                const mesh = new THREE.Mesh(blockGeo, materials[bData.color]);
                mesh.position.set(bData.x, layer.y, bData.z);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                
                // Store metadata for interactions
                mesh.userData = {
                    origPos: mesh.position.clone(),
                    targetPos: mesh.position.clone(),
                    colorKey: bData.color,
                    text: bData.text,
                    isPulled: false
                };

                blocks.push(mesh);
                scene.add(mesh);
            });
        });

        // --- 6. INTERACTION LOGIC ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let activeBlock = null;

        // UI Elements
        const infoCard = document.getElementById('info-card');
        const foodItemEl = document.getElementById('food-item');
        const colorMeaningEl = document.getElementById('color-meaning');
        const emojiBadgeEl = document.getElementById('emoji-badge');
        const resetBtn = document.getElementById('reset-btn');

        // Handle clicks
        window.addEventListener('pointerdown', (event) => {
            // Only left clicks or touch
            if(event.button !== 0 && event.button !== undefined) return;
            
            // Ignore if clicking on UI
            if(event.target.closest('#info-card') || event.target.closest('#reset-btn')) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(blocks);

            if (intersects.length > 0) {
                // FIXED: intersects is an array, we need the first object's object property
                const clickedBlock = intersects.object;
                
                // If a block is already pulled, reset it
                if (activeBlock && activeBlock !== clickedBlock) {
                    activeBlock.userData.targetPos.copy(activeBlock.userData.origPos);
                    activeBlock.userData.isPulled = false;
                    // Reset highlight
                    activeBlock.material.emissive.setHex(0x000000);
                }

                if(!clickedBlock.userData.isPulled) {
                    // Pull out block (Slide forward on Z axis by 1.5 units)
                    activeBlock = clickedBlock;
                    activeBlock.userData.targetPos.set(
                        activeBlock.userData.origPos.x,
                        activeBlock.userData.origPos.y,
                        activeBlock.userData.origPos.z + 1.5
                    );
                    activeBlock.userData.isPulled = true;
                    
                    // Add subtle glow
                    activeBlock.material.emissive.setHex(0x222222);

                    // Update UI Card
                    const config = BLOCK_CONFIG[activeBlock.userData.colorKey];
                    foodItemEl.textContent = activeBlock.userData.text;
                    colorMeaningEl.textContent = config.meaning;
                    colorMeaningEl.style.color = "#fff";
                    // Darken background of badge slightly based on color
                    colorMeaningEl.style.backgroundColor = '#' + config.hex.toString(16).padStart(6, '0');
                    emojiBadgeEl.textContent = config.emoji;

                    infoCard.classList.add('active');
                } else {
                    // Push it back in if clicked again
                    clickedBlock.userData.targetPos.copy(clickedBlock.userData.origPos);
                    clickedBlock.userData.isPulled = false;
                    clickedBlock.material.emissive.setHex(0x000000);
                    activeBlock = null;
                    infoCard.classList.remove('active');
                }
            } else {
                // Clicked outside - reset active block
                if (activeBlock) {
                    activeBlock.userData.targetPos.copy(activeBlock.userData.origPos);
                    activeBlock.userData.isPulled = false;
                    activeBlock.material.emissive.setHex(0x000000);
                    activeBlock = null;
                    infoCard.classList.remove('active');
                }
            }
        });

        // Reset Button functionality
        resetBtn.addEventListener('click', () => {
            blocks.forEach(block => {
                block.userData.targetPos.copy(block.userData.origPos);
                block.userData.isPulled = false;
                block.material.emissive.setHex(0x000000);
            });
            activeBlock = null;
            infoCard.classList.remove('active');
            
            // Reset camera to default view smoothly (handled loosely by resetting position directly for now)
            // A TWEEN library would be smoother, but keeping it dependency-free:
            controls.target.set(0, 1.8, 0);
        });

        // --- 7. ANIMATION & RENDER LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            // Lerp blocks towards their target positions for smooth sliding
            blocks.forEach(block => {
                block.position.lerp(block.userData.targetPos, 0.1);
            });

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        // --- 8. RESPONSIVE DESIGN ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
